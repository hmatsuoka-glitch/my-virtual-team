name: Sync Agents to All Repos

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to all repos
        run: |
          while IFS= read -r REPO || [[ -n "$REPO" ]]; do
            [[ -z "$REPO" || "$REPO" == \#* ]] && continue
            echo "🔄 $REPO を同期中..."
            git clone https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/hmatsuoka-glitch/$REPO /tmp/$REPO
            cd /tmp/$REPO
            git checkout main 2>/dev/null || git checkout -b main
            rm -rf agents
            cp -r $GITHUB_WORKSPACE/agents .
            cp $GITHUB_WORKSPACE/CLAUDE.md ./AGENTS.md
            git config user.email "action@github.com"
            git config user.name "GitHub Actions"
            git add .
            git diff --staged --quiet || git commit -m "Sync agents from my-virtual-team"
            git push origin main
            cd ~
            rm -rf /tmp/$REPO
            echo "✅ $REPO 完了"
          done < $GITHUB_WORKSPACE/repos.txt
